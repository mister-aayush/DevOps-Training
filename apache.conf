<VirtualHost *:8080>
    ServerName apachesite.local
    DocumentRoot /var/www/apachesite/html

    <Directory /var/www/apachesite/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/apachesite_error.log
    CustomLog ${APACHE_LOG_DIR}/apachesite_access.log combined
</VirtualHost>
